name: Crawl deadlines

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 6am UTC

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Crawl (JSON)
        run: uv run python main.py crawl --format json --output output/deadlines.json

      - name: Crawl (YAML)
        run: uv run python main.py crawl --format yaml --output output/deadlines.yaml

      - name: Validate
        run: uv run python main.py validate --input output/deadlines.json

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/deadlines.json output/deadlines.yaml
          git diff --cached --quiet || git commit -m "update crawled deadlines [skip ci]"
          git push
