name: Crawl deadlines

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 6am UTC

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Crawl (JSON)
        run: uv run python main.py crawl --format json --output output/deadlines.json

      - name: Crawl (YAML)
        run: uv run python main.py crawl --format yaml --output output/deadlines.yaml

      - name: Validate
        run: uv run python main.py validate --input output/deadlines.json

      - name: Push output to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git fetch origin output:refs/heads/output 2>/dev/null; then
            git worktree add /tmp/out output
          else
            git worktree add --orphan /tmp/out output
            git -C /tmp/out rm -rf . 2>/dev/null || true
          fi
          cp output/deadlines.json output/deadlines.yaml /tmp/out/
          git -C /tmp/out add deadlines.json deadlines.yaml
          git -C /tmp/out diff --cached --quiet || git -C /tmp/out commit -m "update crawled deadlines [skip ci]"
          git -C /tmp/out push origin output
