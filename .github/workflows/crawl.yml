name: Crawl deadlines

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 6am UTC

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Crawl (JSON) with diff
        run: uv run python main.py crawl --format json --output output/deadlines.json --diff --change-log output/changes.jsonl

      - name: Crawl (YAML)
        run: uv run python main.py crawl --format yaml --output output/deadlines.yaml

      - name: Validate
        run: uv run python main.py validate --input output/deadlines.json

      - name: Push output to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/out
          cp output/deadlines.json output/deadlines.yaml /tmp/out/
          if [ -f output/changes.jsonl ]; then cp output/changes.jsonl /tmp/out/; fi
          if git fetch origin output 2>/dev/null; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/out/* .
          git add deadlines.json deadlines.yaml changes.jsonl 2>/dev/null || git add deadlines.json deadlines.yaml
          git diff --cached --quiet || git commit -m "update crawled deadlines [skip ci]"
          git push origin output
