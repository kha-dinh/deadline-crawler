name: Validate deadlines

on:
  push:
    paths:
      - "crawler/**"
      - "tests/**"
  pull_request:
    paths:
      - "crawler/**"
      - "tests/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Validate output
        run: |
          if [ -f output/deadlines.json ]; then
            uv run python main.py validate --input output/deadlines.json
          else
            echo "No output/deadlines.json — skipping validation"
          fi
