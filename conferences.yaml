# conferences.yaml — crawl config per conference
# Each entry defines how to crawl a conference's CFP page for deadline info.
# Required fields (V7): name, strategy, tags. url required unless by_year present.
# Strategy must be one of: css, regex, llm, static (V8)
#
# Year-agnostic URL templates:
#   Use {YYYY} for 4-digit year, {YY} for 2-digit year in url/url_main.
#   Crawler resolves these at runtime for target year.
#
# Year-specific config (V13):
#   Use by_year: {YYYY: {url, selectors?, cycles?, overrides?}} for conferences
#   with unpredictable URLs or layouts. Year-specific fields merge over top-level.

########################  Security — TIER1  ########################

- name: USENIX Security
  # Pattern: usenixsecurity{YY} — consistent across years
  url: https://www.usenix.org/conference/usenixsecurity{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/usenixsecurity{YY}
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle 1"
      selectors:
        section: 'id="cycle1".*?(?=id="cycle2"|<h3.*Submission Deadlines)'
    - name: "Cycle 2"
      selectors:
        section: 'id="cycle2".*?(?=<h3.*Submission Deadlines|<h2|$)'
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Security Symposium"

- name: "IEEE S&P"
  # Pattern: sp{YYYY}.ieee-security.org — consistent across years
  url: https://sp{YYYY}.ieee-security.org/cfpapers.html
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle 1"
      selectors:
        section: 'id="first-deadline".*?</ul>'
    - name: "Cycle 2"
      selectors:
        section: 'id="second-deadline".*?</ul>'
  overrides:
    description: "IEEE Symposium on Security and Privacy"

- name: ACM CCS
  # Pattern: sigsac.org/ccs/CCS{YYYY} — consistent across years
  url: https://www.sigsac.org/ccs/CCS{YYYY}/call-for/call-for-papers.html
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle A"
      selectors:
        section: 'id="first-review-cycle".*?</ul>'
    - name: "Cycle B"
      selectors:
        section: 'id="second-review-cycle".*?</ul>'
  overrides:
    description: "ACM Conference on Computer and Communications Security"

- name: NDSS
  # Pattern: ndss-symposium.org/ndss{YYYY}/... — consistent across years
  url: https://www.ndss-symposium.org/ndss{YYYY}/submissions/call-for-papers/
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Summer"
      selectors:
        section: "Summer Cycle</h3>.*?(?=Fall Cycle</h3>|<h3)"
    - name: "Fall"
      selectors:
        section: "Fall Cycle</h3>.*?(?=<h2|<h3|$)"
  overrides:
    description: "ISOC Network and Distributed System Security Symposium"
