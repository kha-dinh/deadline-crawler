    2026:
      url: https://2026.hpca-conf.org/track/hpca-2026-main-conference
  overrides:
    description: "IEEE International Symposium on High-Performance Computer Architecture"

- name: DAC
  # Pattern: dac.com/{YYYY}/program/research-manuscript-submissions — consistent
  # Timeline uses <h3 id="date"> cards; section isolates the Timeline block
  url: https://dac.com/{YYYY}/program/research-manuscript-submissions
  strategy: regex
  tags: [HW, A]
  selectors:
    section: 'Timeline.*?(?=</section>|</main>|<footer)'
  overrides:
