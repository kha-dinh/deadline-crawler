# conferences.yaml — crawl config per conference
# Each entry defines how to crawl a conference's CFP page for deadline info.
# Required fields (V7): name, strategy, tags. url required unless by_year present.
# Strategy must be one of: css, regex, llm, static (V8)
#
# Year-agnostic URL templates:
#   Use {YYYY} for 4-digit year, {YY} for 2-digit year in url/url_main.
#   Crawler resolves these at runtime for target year.
#
# Year-specific config (V13):
#   Use by_year: {YYYY: {url, selectors?, cycles?, overrides?}} for conferences
#   with unpredictable URLs or layouts. Year-specific fields merge over top-level.

########################  Security — TIER1  ########################

- name: USENIX Security
  # Pattern: usenixsecurity{YY} — consistent across years
  url: https://www.usenix.org/conference/usenixsecurity{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/usenixsecurity{YY}
  strategy: css
  tags: [SEC, A*]
  cycles:
    - name: "Cycle 1"
      selectors:
        section_css: "#cycle1 + ul"
        items: "li"
        date: "strong"
    - name: "Cycle 2"
      selectors:
        section_css: "#cycle2 + ul"
        items: "li"
        date: "strong"
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Security Symposium"
  by_year:
    2027:
      # CFP page not yet live; deadlines published on main conference page
      url: https://www.usenix.org/conference/usenixsecurity{YY}
      strategy: regex
      cycles:
        - name: "Cycle 1"
          selectors:
            section: '<strong>Cycle 1</strong>.*?(?=<strong>Cycle 2</strong>)'
        - name: "Cycle 2"
          selectors:
            section: '<strong>Cycle 2</strong>.*?</ul>'

- name: "IEEE S&P"
  # Pattern: sp{YYYY}.ieee-security.org — consistent across years
  url: https://sp{YYYY}.ieee-security.org/cfpapers.html
  url_main: https://sp{YYYY}.ieee-security.org/
  strategy: css
  tags: [SEC, A*]
  main_selectors:
    date: "p.location"
  cycles:
    - name: "Cycle 1"
      selectors:
        section_css: "#first-deadline + ul"
        items: "li"
    - name: "Cycle 2"
      selectors:
        section_css: "#second-deadline + ul"
        items: "li"
  overrides:
    description: "IEEE Symposium on Security and Privacy"

- name: ACM CCS
  # Pattern: sigsac.org/ccs/CCS{YYYY} — consistent across years
  url: https://www.sigsac.org/ccs/CCS{YYYY}/call-for/call-for-papers.html
  url_main: https://www.sigsac.org/ccs/CCS{YYYY}/
  strategy: css
  tags: [SEC, A*]
  main_selectors:
    date: "header.masthead .page-heading span.subheading:nth-of-type(1)"
    place: "header.masthead .page-heading span.subheading:nth-of-type(2)"
  cycles:
    - name: "Cycle A"
      selectors:
        section_css: "#first-review-cycle + ul"
        items: "li"
        label: "strong"
    - name: "Cycle B"
      selectors:
        section_css: "#second-review-cycle + ul"
        items: "li"
        label: "strong"
  overrides:
    description: "ACM Conference on Computer and Communications Security"

- name: NDSS
  # Pattern: ndss-symposium.org/ndss{YYYY}/... — consistent across years
  # Cycles in div.wp-block-cover__inner-container: Summer=ul:first-of-type, Fall=ul:last-of-type
  # Each <li> has date at start: "Wed, 23 April 2025: Paper submission deadline"
  url: https://www.ndss-symposium.org/ndss{YYYY}/submissions/call-for-papers/
  url_main: https://www.ndss-symposium.org/ndss{YYYY}/
  strategy: css
  tags: [SEC, A*]
  main_selectors:
    date: ".page-heading.green-heading .wp-block-column p"
  cycles:
    - name: "Summer"
      selectors:
        section_css: "div.wp-block-cover__inner-container ul.wp-block-list:first-of-type"
        items: "li"
    - name: "Fall"
      selectors:
        section_css: "div.wp-block-cover__inner-container ul.wp-block-list:last-of-type"
        items: "li"
  overrides:
    description: "ISOC Network and Distributed System Security Symposium"
