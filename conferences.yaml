- name: ASIACCS
  # Host changes per year — use by_year for URL + selectors
  strategy: regex
  tags: [SEC, A]
  main_selectors:
    date: ".header-bottom p"
  overrides:
    description: "ACM Asia Conference on Computer and Communications Security"
  by_year:
    2025:
      url: https://asiaccs2025.hust.edu.vn/call-for-papers/
      url_main: https://asiaccs2025.hust.edu.vn/
      cycles:
        - name: "Cycle 1"
          selectors:
            section: "Cycle 1 Deadline</strong></h4>.*?(?=Cycle 2 Deadline)"
        - name: "Cycle 2"
          selectors:
            section: "Cycle 2 Deadline</strong></h4>.*?(?=Submission Instructions|<h3)"
    2026:
      url: https://asiaccs2026.cse.iitkgp.ac.in/call-for-papers/
      url_main: https://asiaccs2026.cse.iitkgp.ac.in/
      cycles:
        - name: "Cycle 1"
          selectors:
            section: "1st round\\s*</b></h4>.*?(?=<h4><b>2nd round)"
        - name: "Cycle 2"
          selectors:
            section: "2nd round\\s*</b></h4>.*"

- name: RAID
  # Pattern: raid{YYYY}.github.io — used through 2025; 2026+ use raid{YYYY}.org
  # 2025 (GitHub Pages): table.table with td rows; 2026+ (raid{YYYY}.org): div.col-md-3 cards
  url: https://raid{YYYY}.github.io/call.html
  url_main: https://raid{YYYY}.github.io/
  strategy: css
  tags: [SEC, A]
  main_selectors:
    date: "span.pill"
  selectors:
    section_css: "table.table"
    items: "tr"
    label: "td:first-child"
  overrides:
    description: "International Symposium on Research in Attacks, Intrusions and Defenses"
  by_year:
    2026:
      url: https://raid2026.org/call.html
      url_main: https://raid2026.org/
      selectors:
        items: "div.col-md-3"

- name: ACSAC
  # Pattern: acsac.org/{YYYY}/submissions/papers/ — consistent
  url: https://www.acsac.org/{YYYY}/submissions/papers/
  url_main: https://www.acsac.org/{YYYY}/
  strategy: regex
  tags: [SEC, A]
  main_selectors:
    date: "#extended-logo .font-heading-3xs"
  selectors:
    section: 'Call for Papers</h1>.*?(?=<b>Program Chair|<div class="font-serif")'
  overrides:
    description: "Annual Computer Security Applications Conference"

- name: "IEEE EuroS&P"
  # Pattern: eurosp{YYYY}.ieee-security.org — consistent across years
  # 2025: 3-column table (track|label|date); 2026+: first <ul> on page contains deadlines
  # Only 2026+ tested; 2025 structure preserved in comment for reference
  url: https://eurosp{YYYY}.ieee-security.org/cfp.html
  url_main: https://eurosp{YYYY}.ieee-security.org/
  strategy: css
  tags: [SEC, A]
  main_selectors:
    date: "p.location"
  selectors:
    section_css: "ul"
    items: "li"
  overrides:
    description: "IEEE European Symposium on Security and Privacy"

- name: PoPETs
  # Pattern: petsymposium.org/cfp{YY}.php — 2-digit year; 4 rolling issues/year (journal-style)
  # All issues in <div class="deadlines">; each issue is <p><b>Issue N</b><br>...dates...</p>
  url: https://petsymposium.org/cfp{YY}.php
  url_main: https://petsymposium.org/
  strategy: regex
  tags: [SEC, A]
  main_selectors:
    date: "div.pets-home > h3"
  cycles:
    - name: "Issue 1"
      selectors:
        section: "<b>Issue 1</b>.*?(?=<b>Issue 2</b>|</div>)"
    - name: "Issue 2"
      selectors:
        section: "<b>Issue 2</b>.*?(?=<b>Issue 3</b>|</div>)"
    - name: "Issue 3"
      selectors:
        section: "<b>Issue 3</b>.*?(?=<b>Issue 4</b>|</div>)"
    - name: "Issue 4"
      selectors:
        section: "<b>Issue 4</b>.*?(?=</div>|$)"
  overrides:
    description: "Privacy Enhancing Technologies Symposium"

- name: DIMVA
  # Pattern: www.dimva.org/dimva{YYYY}/ — consistent across years; 2 submission cycles
  # Nested <ul>: outer LI = "Cycle N:", inner LI = deadlines. Strikethrough = old date, <b> = extended
  # Top-level section scopes to CFP block only (separate "Call for Posters" Important Dates further down)
  url: https://www.dimva.org/dimva{YYYY}/
  strategy: regex
  tags: [SEC, B]
  main_selectors:
    date: "#header h4"
  selectors:
    section: "Call for Papers.*?(?=Call for Posters|<h2)"
  cycles:
    - name: "Cycle 1"
      selectors:
        section: "Cycle 1:.*?(?=Cycle 2:|$)"
    - name: "Cycle 2"
      selectors:
        section: "Cycle 2:.*?(?=Camera ready|$)"
  overrides:
    description: "International Conference on Detection of Intrusions and Malware & Vulnerability Assessment"

########################  Systems — TIER1  ########################

- name: SOSP
  # Pattern: sigops.org/s/conferences/sosp/{YYYY}/cfp.html — moved to ACM/SIGOPS
  # Main page: .hero-container p.mb-4.pb-0 has "Date · Venue, City, Country" (combined)
  url: https://sigops.org/s/conferences/sosp/{YYYY}/cfp.html
  url_main: https://sigops.org/s/conferences/sosp/{YYYY}/
  strategy: css
  tags: [SYS, A*]
  selectors:
    section_css: "#dates"
    items: "tr"
    label: "td:first-child"
    date: "td:nth-child(2)"
  main_selectors:
    date: ".hero-container p.mb-4.pb-0"
  overrides:
    description: "ACM Symposium on Operating Systems Principles"

- name: OSDI
  # Pattern: usenix.org/conference/osdi{YY}/call-for-papers — consistent
  # Biennial: even years only; dates in <li> items with date in <strong> within field-column-wysiwyg
  url: https://www.usenix.org/conference/osdi{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/osdi{YY}
  strategy: css
  tags: [SYS, A*]
  selectors:
    section_css: ".field-name-field-column-wysiwyg .field-item"
    items: "li"
    date: "strong"
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Symposium on Operating Systems Design and Implementation"

- name: EuroSys
  # Pattern: {YYYY}.eurosys.org/cfp.html — consistent
  # Main page: 2 .intro-lead-in divs — 1st=place, 2nd=date
  url: https://{YYYY}.eurosys.org/cfp.html
  url_main: https://{YYYY}.eurosys.org/
  strategy: regex
  tags: [SYS, A]
  cycles:
    - name: "Spring"
      selectors:
        section: "Spring deadline</h3>.*?(?=Fall deadline</h3>|<h2)"
    - name: "Fall"
      selectors:
        section: "Fall deadline</h3>.*?(?=<h2|<h3|$)"
  main_selectors:
    date: ".intro-lead-in:last-of-type"
    place: ".intro-lead-in:first-of-type"
  overrides:
    description: "European Conference on Computer Systems"

- name: ASPLOS
  # Pattern: asplos-conference.org/asplos{YYYY}/cfp/ — consistent
  # Cycles: <p>Spring/April Cycle</p> or <p>Summer/September Cycle</p> each followed by <ul.wp-block-list>
  # Spring/April = 1st ul, Summer/September = 2nd ul within div.entry-content
  # Main page: p.site-description has "Place – Date" combined text
  url: https://www.asplos-conference.org/asplos{YYYY}/cfp/
  url_main: https://www.asplos-conference.org/asplos{YYYY}/
  strategy: css
  tags: [SYS, A*]
  cycles:
    - name: "Spring"
      selectors:
        section_css: "div.entry-content ul.wp-block-list:first-of-type"
        items: "li"
    - name: "Summer"
      selectors:
        section_css: "div.entry-content ul.wp-block-list:nth-of-type(2)"
        items: "li"
  main_selectors:
    date: "p.site-description"
  overrides:
    description: "International Conference on Architectural Support for Programming Languages and Operating Systems"

- name: ATC
  # Pattern: sigops.org/s/conferences/atc/{YYYY}/cfp.html — moved to ACM/SIGOPS in 2026
  # 2025 and earlier: url_main = usenix.org, USENIX-style main_selectors
  # 2026+: url_main = sigops.org, hero-container selector (same platform as SOSP)
  url: https://sigops.org/s/conferences/atc/{YYYY}/cfp.html
  url_main: https://www.usenix.org/conference/atc{YY}
  strategy: css
  tags: [SYS, A]
  selectors:
    section_css: "#dates"
    items: "tr"
    label: "td:first-child"
    date: "td:nth-child(2)"
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "ACM SIGOPS Annual Technical Conference"
  by_year:
    2026:
      url_main: https://sigops.org/s/conferences/atc/2026/
      main_selectors:
        date: ".hero-container p.mb-4.pb-0"

- name: NSDI
  # Pattern: usenix.org/conference/nsdi{YY}/call-for-papers — consistent
  # Cycles delimited by <p><strong>Spring/Fall deadline:</strong></p> (no IDs);
  # Spring = first <ul>, Fall = second <ul> within .field-name-field-column-wysiwyg .field-item
  url: https://www.usenix.org/conference/nsdi{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/nsdi{YY}
  strategy: css
  tags: [SYS, A*]
  cycles:
    - name: "Spring"
      selectors:
        section_css: ".field-name-field-column-wysiwyg .field-item ul:first-of-type"
        items: "li"
    - name: "Fall"
      selectors:
        section_css: ".field-name-field-column-wysiwyg .field-item ul:nth-of-type(2)"
        items: "li"
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Symposium on Networked Systems Design and Implementation"
- name: SIGCOMM
  # Pattern: conferences.sigcomm.org/sigcomm/{YYYY}/cfp/ — consistent
  # Dates in <table class=compact-table>; each row uses <th> (not <td>) for label and date
  # Main page: first span.text-color-secondary=date, second=place
  url: https://conferences.sigcomm.org/sigcomm/{YYYY}/cfp/
  url_main: https://conferences.sigcomm.org/sigcomm/{YYYY}/
  strategy: css
  tags: [SYS, A*]
  selectors:
    section_css: "table.compact-table"
    items: "tr"
    label: "th:first-child"
    date: "th:last-child"
  main_selectors:
    date: "span.text-color-secondary:first-of-type"
    place: "span.text-color-secondary:last-of-type"
  overrides:
    description: "ACM SIGCOMM Conference on Data Communication"

