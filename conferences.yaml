    - name: "Fall"
      selectors:
        section: "Fall deadline:</strong>.*?</ul>"
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Symposium on Networked Systems Design and Implementation"
