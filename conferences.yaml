- name: KDD
  # Pattern: kdd{YYYY}.kdd.org — consistent.
  # 2 cycles (August/Cycle-1 + February/Cycle-2) in tab panels.
  url: https://kdd{YYYY}.kdd.org/research-track-call-for-papers/
  url_main: https://kdd{YYYY}.kdd.org/
  strategy: regex
  tags: [SYS]
  description: "ACM International Conference on Knowledge Discovery and Data Mining"
  cycles:
    - name: "Cycle 1 (August)"
      section: "(?i)august[^<]*(?:cycle|deadline)[^<]*</[^>]+>.*?(?=(?i)february[^<]*(?:cycle|deadline)|$)"
    - name: "Cycle 2 (February)"
      section: "(?i)february[^<]*(?:cycle|deadline)[^<]*</[^>]+>.*?(?=<h[23]|$)"

