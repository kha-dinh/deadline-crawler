########################  Software Engineering — TIER1  ########################

- name: ICSE
  # Pattern: conf.researchr.org/dates/icse-{YYYY} — consistent
  url: https://conf.researchr.org/dates/icse-{YYYY}
  strategy: regex
  tags: [SE, TIER1]
  # researchr.org dates page: each <tr> has href to track, 3 <td>s: date, track name, label
  # Pattern: <tr...href="...TRACK"...><td>DATE<span...></td><td>NAME</td><td>LABEL</td></tr>
  cycles:
    - name: "Cycle 1"
      selectors:
        researchr_track: icse-{YYYY}-research-track
        researchr_cycle: "First Cycle"
    - name: "Cycle 2"
      selectors:
        researchr_track: icse-{YYYY}-research-track
        researchr_cycle: "Second Cycle"
  by_year:
    2027:
      # ICSE 2027 dropped two-cycle format — single cycle, no "First/Second Cycle:" prefix
      cycles: null
  overrides:
    description: "International Conference on Software Engineering"

- name: FSE
  # Pattern: conf.researchr.org/dates/fse-{YYYY} — consistent
  url: https://conf.researchr.org/dates/fse-{YYYY}
  strategy: regex
  tags: [SE, TIER1]
  overrides:
    description: "ACM Joint European Software Engineering Conference and Symposium on the Foundations of Software Engineering"

- name: ASE
  # Pattern: conf.researchr.org/dates/ase-{YYYY} — consistent
  # Track ID varies: ase-YYYY-papers (2025) vs ase-YYYY-research-track (2026) — auto-discovered
  url: https://conf.researchr.org/dates/ase-{YYYY}
  strategy: regex
  tags: [SE, TIER1]
  overrides:
    description: "International Conference on Automated Software Engineering"

- name: ISSTA
  # Pattern: conf.researchr.org/dates/issta-{YYYY} — consistent
  # Track ID varies: issta-YYYY-papers (2025) vs issta-YYYY-research-papers (2026) — auto-discovered
  url: https://conf.researchr.org/dates/issta-{YYYY}
  strategy: regex
  tags: [SE, TIER1]
  overrides:
    description: "International Symposium on Software Testing and Analysis"

