# conferences.yaml — crawl config per conference
# Each entry defines how to crawl a conference's CFP page for deadline info.
# Required fields (V7): name, strategy, tags. url required unless by_year present.
# Strategy must be one of: css, regex, llm, static (V8)
#
# Year-agnostic URL templates:
#   Use {YYYY} for 4-digit year, {YY} for 2-digit year in url/url_main.
#   Crawler resolves these at runtime for target year.
#
# Year-specific config (V13):
#   Use by_year: {YYYY: {url, selectors?, cycles?, overrides?}} for conferences
#   with unpredictable URLs or layouts. Year-specific fields merge over top-level.
#
# event_selectors (T25): CSS selectors to scrape event date/place from url_main.
#   Implicit defaults (no block needed):
#     conf.researchr.org url_main → {date: "div.place", place: "div.place a"}
#     usenix.org url_main        → {date: ".field-name-field-date-text .field-item",
#                                   place: ".field-name-field-address-text .field-item"}
#   Explicit event_selectors: block required for all other sites.
#
# Cycle hoisting (T26): shared selector fields live in top-level selectors:.
#   Each cycle is flat {name, discriminator} where discriminator is one of:
#     section_css     — CSS selector to narrow DOM (css strategy)
#     section         — regex to narrow HTML (regex strategy)
#     researchr_cycle — cycle label filter for researchr.org pages

########################  Cryptography  ########################
# IACR flagship conferences. All use the same Bootstrap-based template:
#   article.customCard:first-of-type  →  "Important dates" card
#   div.customCardRow  →  one row per date entry
#   h6.dateTitle  →  date text, p  →  label text

- name: Crypto
  # Pattern: crypto.iacr.org/{YYYY}/ — consistent IACR template
  url: https://crypto.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "IACR Annual International Cryptology Conference"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

- name: Eurocrypt
  # Pattern: eurocrypt.iacr.org/{YYYY}/ — consistent IACR template
  url: https://eurocrypt.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "Annual International Conference on the Theory and Applications of Cryptographic Techniques"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

- name: Asiacrypt
  # Pattern: asiacrypt.iacr.org/{YYYY}/ — consistent IACR template
  url: https://asiacrypt.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "Annual International Conference on the Theory and Application of Cryptology and Information Security"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

- name: TCC
  # Pattern: tcc.iacr.org/{YYYY}/ — consistent IACR template
  url: https://tcc.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "Theory of Cryptography Conference"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

- name: PKC
  # Pattern: pkc.iacr.org/{YYYY}/ — consistent IACR template
  url: https://pkc.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "IACR International Conference on Practice and Theory in Public-Key Cryptography"
  # IACR header: .headerInfoTop=date, .headerInfoBottom=place (same page as CFP)
  event_selectors:
    date: ".headerInfoTop"
    place: ".headerInfoBottom"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

- name: CHES
  # Pattern: ches.iacr.org/{YYYY}/ — consistent IACR template
  # CHES/TCHES has 4 submission cycles per year (h5 separators); CSS extracts cycle 1 only.
  url: https://ches.iacr.org/{YYYY}/
  strategy: css
  tags: [CRYPTO]
  description: "Workshop on Cryptographic Hardware and Embedded Systems"
  # IACR header: .headerInfoTop=date, .headerInfoBottom=place (same page as CFP)
  event_selectors:
    date: ".headerInfoTop"
    place: ".headerInfoBottom"
  selectors:
    section_css: "article.customCard:first-of-type"
    items: "div.customCardRow"
    date: "h6.dateTitle"
    label: "p"

########################  Security — TIER1  ########################

- name: USENIX Security
  core_acronym: USENIX-Security
  # Pattern: usenixsecurity{YY} — consistent across years
  url: https://www.usenix.org/conference/usenixsecurity{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/usenixsecurity{YY}
  strategy: css
  tags: [SEC]
  description: "USENIX Security Symposium"
  # event_selectors: implicit from usenix.org url_main
  selectors:
    items: "li"
    date: "strong"
  cycles:
    - name: "Cycle 1"
      section_css: "#cycle1 + ul"
    - name: "Cycle 2"
      section_css: "#cycle2 + ul"
  by_year:
    2027:
      # CFP page not yet live; deadlines published on main conference page
      url: https://www.usenix.org/conference/usenixsecurity{YY}
      strategy: regex
      cycles:
        - name: "Cycle 1"
          section: "<strong>Cycle 1</strong>.*?(?=<strong>Cycle 2</strong>)"
        - name: "Cycle 2"
          section: "<strong>Cycle 2</strong>.*?</ul>"

- name: "IEEE S&P"
  core_acronym: SP
  # Pattern: sp{YYYY}.ieee-security.org — consistent across years
  url: https://sp{YYYY}.ieee-security.org/cfpapers.html
  url_main: https://sp{YYYY}.ieee-security.org/
  strategy: css
  tags: [SEC]
  description: "IEEE Symposium on Security and Privacy"
  event_selectors:
    date: "p.location"
  selectors:
    items: "li"
  cycles:
    - name: "Cycle 1"
      section_css: "#first-deadline + ul"
    - name: "Cycle 2"
      section_css: "#second-deadline + ul"

- name: ACM CCS
  core_acronym: CCS
  # Pattern: sigsac.org/ccs/CCS{YYYY} — consistent across years
  url: https://www.sigsac.org/ccs/CCS{YYYY}/call-for/call-for-papers.html
  url_main: https://www.sigsac.org/ccs/CCS{YYYY}/
  strategy: css
  tags: [SEC]
  description: "ACM Conference on Computer and Communications Security"
  event_selectors:
    date: "header.masthead .page-heading span.subheading:nth-of-type(1)"
    place: "header.masthead .page-heading span.subheading:nth-of-type(2)"
  selectors:
    items: "li"
    label: "strong"
  cycles:
    - name: "Cycle A"
      section_css: "#first-review-cycle + ul"
    - name: "Cycle B"
      section_css: "#second-review-cycle + ul"

- name: NDSS
  # Pattern: ndss-symposium.org/ndss{YYYY}/... — consistent across years
  # Cycles in div.wp-block-cover__inner-container: Summer=ul:first-of-type, Fall=ul:last-of-type
  # Each <li> has date at start: "Wed, 23 April 2025: Paper submission deadline"
  url: https://www.ndss-symposium.org/ndss{YYYY}/submissions/call-for-papers/
  url_main: https://www.ndss-symposium.org/ndss{YYYY}/
  strategy: css
  tags: [SEC]
  description: "ISOC Network and Distributed System Security Symposium"
  event_selectors:
    date: ".page-heading.green-heading .wp-block-column p"
  selectors:
    items: "li"
  cycles:
    - name: "Summer"
      section_css: "div.wp-block-cover__inner-container ul.wp-block-list:first-of-type"
    - name: "Fall"
      section_css: "div.wp-block-cover__inner-container ul.wp-block-list:last-of-type"

