- name: ICSE
  # Pattern: conf.researchr.org/dates/icse-{YYYY} — consistent
  # Home page: div.place has "Date <a>City, Country</a>" — consistent across all researchr conferences
  url: https://conf.researchr.org/dates/icse-{YYYY}
  url_main: https://conf.researchr.org/home/icse-{YYYY}
  strategy: regex
  tags: [SE, A*]
  # researchr.org dates page: each <tr> has href to track, 3 <td>s: date, track name, label
  cycles:
    - name: "Cycle 1"
      selectors:
        researchr_track: icse-{YYYY}-research-track
        researchr_cycle: "First Cycle"
    - name: "Cycle 2"
      selectors:
        researchr_track: icse-{YYYY}-research-track
        researchr_cycle: "Second Cycle"
  main_selectors:
    date: "div.place"
    place: "div.place a"
  by_year:
