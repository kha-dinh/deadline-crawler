# conferences.yaml — crawl config per conference
# Each entry defines how to crawl a conference's CFP page for deadline info.
# Required fields (V7): name, url, strategy, tags
# Strategy must be one of: css, regex, llm, static (V8)
#
# Year-agnostic URL templates:
#   Use {YYYY} for 4-digit year, {YY} for 2-digit year in url/url_main.
#   Crawler resolves these at runtime for target year.
#   If a site's URL pattern is unpredictable, set url_fixed: true
#   and update url manually each year.

########################  Security — TIER1  ########################

- name: USENIX Security
  # Pattern: usenixsecurity{YY} — consistent across years
  url: https://www.usenix.org/conference/usenixsecurity{YY}/call-for-papers
  url_main: https://www.usenix.org/conference/usenixsecurity{YY}
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle 1"
      selectors:
        section: 'id="cycle1".*?(?=id="cycle2"|<h3.*Submission Deadlines)'
        deadlines:
          - label: abstract
            pattern: 'Mandatory registration.*?due:\s*<strong>(.*?)</strong>'
          - label: submission
            pattern: 'Paper submissions.*?due:\s*<strong>(.*?)</strong>'
          - label: early_reject
            pattern: 'Early reject notification:\s*<strong>(.*?)</strong>'
          - label: notification
            pattern: 'Notification to authors:\s*<strong>(.*?)</strong>'
          - label: shepherd
            pattern: 'Shepherded approval due:\s*<strong>(.*?)</strong>'
          - label: camera_ready
            pattern: 'Final paper files due:\s*<strong>(.*?)</strong>'
    - name: "Cycle 2"
      selectors:
        section: 'id="cycle2".*?(?=<h3.*Submission Deadlines|<h2|$)'
        deadlines:
          - label: abstract
            pattern: 'Mandatory registration.*?due:\s*<strong>(.*?)</strong>'
          - label: submission
            pattern: 'Paper submissions due:\s*<strong>(.*?)</strong>'
          - label: early_reject
            pattern: 'Early reject notification:\s*<strong>(.*?)</strong>'
          - label: notification
            pattern: 'Notification to authors:\s*<strong>(.*?)</strong>'
          - label: shepherd
            pattern: 'Shepherded approval due:\s*<strong>(.*?)</strong>'
          - label: camera_ready
            pattern: 'Final paper files due:\s*<strong>(.*?)</strong>'
  main_selectors:
    date: ".field-name-field-date-text .field-item"
    place: ".field-name-field-address-text .field-item"
  overrides:
    description: "USENIX Security Symposium"

- name: "S&P"
  # Pattern: sp{YYYY}.ieee-security.org — consistent across years
  url: https://sp{YYYY}.ieee-security.org/cfpapers.html
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle 1"
      selectors:
        section: 'id="first-deadline".*?</ul>'
        deadlines:
          - label: abstract
            pattern: '<li>Abstract registration deadline:\s*(.*?)(?:\s+mandatory)?</li>'
          - label: submission
            pattern: '<li>Paper submission deadline:\s*(.*?)</li>'
          - label: early_reject
            pattern: '<li>Early-reject notification:\s*(.*?)</li>'
          - label: notification
            pattern: '<li>Acceptance notification:\s*(.*?)</li>'
          - label: camera_ready
            pattern: '<li>Camera-ready deadline:\s*(.*?)</li>'
    - name: "Cycle 2"
      selectors:
        section: 'id="second-deadline".*?</ul>'
        deadlines:
          - label: abstract
            pattern: '<li>Abstract.*?registration deadline:\s*(.*?)(?:,\s*mandatory)?(?:\s*\(.*?\))?</li>'
          - label: submission
            pattern: '<li>Paper submission deadline:\s*(.*?)</li>'
          - label: early_reject
            pattern: '<li>Early-reject notification:\s*(.*?)</li>'
          - label: notification
            pattern: '<li>Acceptance notification:\s*(.*?)</li>'
          - label: camera_ready
            pattern: '<li>Camera-ready deadline:\s*(.*?)</li>'
  overrides:
    description: "IEEE Symposium on Security and Privacy"

- name: CCS
  # Pattern: sigsac.org/ccs/CCS{YYYY} — consistent across years
  url: https://www.sigsac.org/ccs/CCS{YYYY}/call-for/call-for-papers.html
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Cycle A"
      selectors:
        section: 'id="first-review-cycle".*?</ul>'
        deadlines:
          - label: abstract
            pattern: '<li><strong>Abstract submission deadline</strong><br>\s*(.*?)(?:\s*<em>.*?)?</li>'
          - label: submission
            pattern: '<li><strong>Full paper submission deadline</strong><br>\s*(.*?)(?:\s*<em>.*?)?</li>'
          - label: early_reject
            pattern: '<li><strong>Notification of early-rejection papers</strong><br>\s*(.*?)</li>'
          - label: rebuttal_end
            pattern: '<li><strong>Rebuttal deadline</strong><br>\s*(.*?)</li>'
          - label: notification
            pattern: '<li><strong>Author notification</strong><br>\s*(.*?)</li>'
          - label: camera_ready
            pattern: '<li><strong>Camera ready deadline</strong><br>\s*(.*?)</li>'
    - name: "Cycle B"
      selectors:
        section: 'id="second-review-cycle".*?</ul>'
        deadlines:
          - label: abstract
            pattern: '<li><strong>Abstract submission deadline</strong><br>\s*(.*?)(?:\s*<em>.*?)?</li>'
          - label: submission
            pattern: '<li><strong>Full paper submission deadline</strong><br>\s*(.*?)(?:\s*<em>.*?)?</li>'
          - label: early_reject
            pattern: '<li><strong>Notification of early-rejection papers</strong><br>\s*(?:<s>.*?</s>\s*)?(.*?)</li>'
          - label: rebuttal_end
            pattern: '<li><strong>Rebuttal deadline</strong><br>\s*(.*?)</li>'
          - label: notification
            pattern: '<li><strong>Author notification</strong><br>\s*(.*?)</li>'
          - label: camera_ready
            pattern: '<li><strong>Camera ready deadline</strong><br>\s*(.*?)</li>'
  overrides:
    description: "ACM Conference on Computer and Communications Security"

- name: NDSS
  # Pattern: ndss-symposium.org/ndss{YYYY}/... — consistent across years
  url: https://www.ndss-symposium.org/ndss{YYYY}/submissions/call-for-papers/
  strategy: regex
  tags: [SEC, TIER1]
  cycles:
    - name: "Summer"
      selectors:
        section: "Summer Cycle</h3>.*?(?=Fall Cycle</h3>|<h3)"
        deadlines:
          - label: submission
            pattern: '<li>\w+,\s*([^<:]+):\s*Paper submission deadline'
          - label: early_reject
            pattern: '<li>\w+,\s*([^<:]+):\s*Early reject'
          - label: notification
            pattern: '<li>\w+,\s*([^<:]+):\s*Author notification<'
          - label: camera_ready
            pattern: '<li>\w+,\s*([^<:]+):\s*Camera Ready deadline'
    - name: "Fall"
      selectors:
        section: "Fall Cycle</h3>.*?(?=<h2|<h3|$)"
        deadlines:
          - label: submission
            pattern: '<li>\w+,\s*([^<:]+):\s*Paper submission deadline'
          - label: early_reject
            pattern: '<li>\w+,\s*([^<:]+):\s*Early reject'
          - label: notification
            pattern: '<li>\w+,\s*([^<:]+):\s*Author notification<'
          - label: camera_ready
            pattern: '<li>\w+,\s*([^<:]+):\s*Camera Ready deadline'
  overrides:
    description: "ISOC Network and Distributed System Security Symposium"
