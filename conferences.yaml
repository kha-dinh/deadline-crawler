- name: IMC
  # Pattern: conferences.sigcomm.org/imc/{YYYY}/cfp/ — consistent; 2 submission cycles
  # Cycles delimited by <h2>Cycle N Deadline</h2> (no id); rows use <td>
  # Main page: .container.hero h2 — 1st=place, 2nd=date
  url: https://conferences.sigcomm.org/imc/{YYYY}/cfp/
  url_main: https://conferences.sigcomm.org/imc/{YYYY}/
  strategy: regex
  tags: [SYS]
  description: "ACM Internet Measurement Conference"
  event_selectors:
    date: ".container.hero h2:nth-of-type(2)"
    place: ".container.hero h2:first-of-type"
  cycles:
    - name: "Cycle 1"
      section: "Cycle 1 Deadline</h2>.*?(?=<h2)"
      deadlines:
        - label: abstract
          pattern: '<td>Paper registration[^<]*</td>\s*<td>([^<]+)</td>'
        - label: submission
          pattern: '<td>Paper submission</td>\s*<td>([^<]+)</td>'
        - label: early_reject
          pattern: '<td>Early reject notification</td>\s*<td>([^<]+)</td>'
        - label: notification
          pattern: '<td>Notification</td>\s*<td>([^<]+)</td>'
        - label: camera_ready
          pattern: '<td>Shepherd approval[^<]*</td>\s*<td>([^<]+)</td>'
    - name: "Cycle 2"
      section: "Cycle 2 Deadline</h2>.*?(?=<h2)"
      deadlines:
        - label: abstract
          pattern: '<td>Paper registration[^<]*</td>\s*<td>([^<]+)</td>'
        - label: submission
          pattern: '<td>Paper submission \(including[^<]*</td>\s*<td>([^<]+)</td>'
        - label: early_reject
          pattern: '<td>Early reject notification</td>\s*<td>([^<]+)</td>'
        - label: notification
          pattern: '<td>Notification</td>\s*<td>([^<]+)</td>'
        - label: camera_ready
          pattern: '<td>Shepherd approval[^<]*</td>\s*<td>([^<]+)</td>'

- name: HotOS
  # Biennial (odd years: 2025, 2027...) — use by_year; ACM SIGOPS-hosted
  # Dates in <ul> sibling of <div.section-header> inside <div.container>
  strategy: css
  tags: [SYS]
  description: "Workshop on Hot Topics in Operating Systems"
  selectors:
    section_css: "div.container > ul"
    items: "li"
  by_year:
    2025:
      url: https://sigops.org/s/conferences/hotos/2025/cfp.html
    2027:
      url: https://sigops.org/s/conferences/hotos/2027/cfp.html

########################  Software Engineering — TIER1  ########################

- name: ICSE
  # Pattern: conf.researchr.org/dates/icse-{YYYY} — consistent
  # Home page: div.place has "Date <a>City, Country</a>" — consistent across all researchr conferences
  url: https://conf.researchr.org/dates/icse-{YYYY}
  url_main: https://conf.researchr.org/home/icse-{YYYY}
  strategy: regex
  tags: [SE]
  description: "International Conference on Software Engineering"
  # event_selectors: implicit from conf.researchr.org url_main
  # researchr.org dates page: each <tr> has href to track, 3 <td>s: date, track name, label
  selectors:
    researchr_track: icse-{YYYY}-research-track
  cycles:
    - name: "Cycle 1"
      researchr_cycle: "First Cycle"
    - name: "Cycle 2"
      researchr_cycle: "Second Cycle"
  by_year:
    2027:
      # ICSE 2027 dropped two-cycle format — single cycle, no "First/Second Cycle:" prefix
      cycles: null

- name: FSE
  # Pattern: conf.researchr.org/dates/fse-{YYYY} — consistent
  url: https://conf.researchr.org/dates/fse-{YYYY}
  url_main: https://conf.researchr.org/home/fse-{YYYY}
  strategy: regex
  tags: [SE]
  description: "ACM Joint European Software Engineering Conference and Symposium on the Foundations of Software Engineering"
  # event_selectors: implicit from conf.researchr.org url_main

- name: ASE
  # Pattern: conf.researchr.org/dates/ase-{YYYY} — consistent
