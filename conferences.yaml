- name: ISCA
  # CFP sub-path varies between years (papers.php vs callforpapers.php) — use by_year
  # 2026: table has 3 cols (label | Main Track | Industry Track); section isolates panel
  strategy: regex
  tags: [HW, A*]
  by_year:
    2025:
      url: https://iscaconf.org/isca2025/submit/papers.php
    2026:
      url: https://iscaconf.org/isca2026/submit/callforpapers.php
      selectors:
        section: "Important Dates.*?</table>"
  overrides:
    description: "International Symposium on Computer Architecture"

- name: MICRO
  # Uses sequential edition numbers (not years): MICRO-58=2025, MICRO-59=2026 — use by_year
  # 2026: deadlines in <ul> under <h4>Important Dates</h4>; section isolates the list
  strategy: regex
  tags: [HW, A*]
  by_year:
    2025:
      url: https://www.microarch.org/micro58/submit/papers.php
    2026:
      url: https://www.microarch.org/micro59/submit/papers.php
      selectors:
        section: "Important Dates.*?</ul>"
  overrides:
    description: "IEEE/ACM International Symposium on Microarchitecture"

- name: HPCA
  # URL structure changed between years — use by_year
  strategy: regex
  tags: [HW, A*]
